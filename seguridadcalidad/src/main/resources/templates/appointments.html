<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Citas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/js/appointments.js}" defer></script>
</head>
<body>
<div class="page-container">
    <h1>Citas agendadas</h1>
    <div class="actions">
        <a class="btn btn-primary" th:href="@{/appointments/new}">Agendar cita</a>
        <a class="btn btn-secondary" th:href="@{/home}">Volver a inicio</a>
    </div>
    <div class="table-wrapper">
        <table class="patients-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Motivo</th>
                <th>Veterinario</th>
            </tr>
            </thead>
            <tbody id="appointmentsTableBody">
            <tr><td colspan="6">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
