<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Mascota</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/js/new_pet.js}" defer></script>
</head>
<body>
<div class="page-container">
    <h1>Registrar mascota para adopcion</h1>
    <form id="petForm" class="patient-form">
        <div>
            <label>Nombre:</label>
            <input type="text" id="name" required />
        </div>
        <div>
            <label>Especie:</label>
            <input type="text" id="species" required />
        </div>
        <div>
            <label>Raza:</label>
            <input type="text" id="breed" required />
        </div>
        <div>
            <label>Edad:</label>
            <input type="number" id="age" min="0" required />
        </div>
        <div>
            <label>Genero:</label>
            <select id="gender" required>
                <option value="" disabled selected>Selecciona genero</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>
        </div>
        <div>
            <label>Ubicacion:</label>
            <input type="text" id="location" />
        </div>
        <div>
            <label>Foto URL:</label>
            <input type="url" id="photoUrl" placeholder="https://..." />
        </div>
        <div>
            <label>Vista previa:</label>
            <div>
                <img id="photoPreview" class="pet-photo" alt="Vista previa de foto" style="display:none;" />
                <span id="photoPreviewEmpty" class="pet-photo-empty">Sin foto</span>
            </div>
        </div>
        <div>
            <label>Estado:</label>
            <select id="status" required>
                <option value="available" selected>Disponible</option>
                <option value="adopted">Adoptada</option>
                <option value="unavailable">No disponible</option>
            </select>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Guardar</button>
            <a class="btn btn-secondary" href="/pets">Cancelar</a>
        </div>

        <div id="errorPet" style="color: red; margin-top: 1rem;"></div>
    </form>
</div>


</body>
</html>
