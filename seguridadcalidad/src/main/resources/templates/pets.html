<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mascotas en Adopcion</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/js/pets.js}" defer></script>
</head>
<body>
<div class="page-container">
    <h1>Mascotas en adopcion</h1>
    <div class="actions">
        <a id="btnRegistrarMascotas" class="btn btn-primary" th:href="@{/pets/new}" style="display: none;">Registrar mascota</a>
        <a class="btn btn-secondary" id="btn" th:href="@{/home}">Volver a inicio</a>
    </div>

    <form id="searchForm" class="patient-form" style="margin-bottom: 1rem;">
        <div>
            <label>Especie:</label>
            <input type="text" id="species" placeholder="Perro, Gato..." />
        </div>
        <div>
            <label>Genero:</label>
            <select id="gender">
                <option value="">Todos</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>
        </div>
        <div>
            <label>Ubicacion:</label>
            <input type="text" id="location" placeholder="Santiago" />
        </div>
        <div>
            <label>Edad:</label>
            <input type="number" id="age" min="0" placeholder="3" />
        </div>
        <div>
            <label>Estado:</label>
            <select id="status">
                <option value="">Todos</option>
                <option value="available" selected>Disponibles</option>
                <option value="adopted">Adoptadas</option>
                <option value="unavailable">No disponibles</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Buscar</button>
            <button class="btn btn-secondary" type="button" id="btnReset">Limpiar</button>
            <button class="btn btn-secondary" type="button" id="btnLoadAll">Ver todas</button>
        </div>
    </form>

    <div id="petsMessage" style="margin-bottom: 0.75rem;"></div>

    <div class="table-wrapper">
        <table class="patients-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Foto</th>
                <th>Nombre</th>
                <th>Especie</th>
                <th>Raza</th>
                <th>Edad</th>
                <th>Genero</th>
                <th>Ubicacion</th>
                <th>Estado</th>
                <th id="columnAcciones" style="display: none;">Acciones</th>
            </tr>
            </thead>
            <tbody id="petsTableBody">
            <tr><td colspan="10">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>
</div>


</body>
</html>
