<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Paciente</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <script type="text/javascript" th:src="@{/js/new_patient.js}" defer></script>
</head>
<body>
<div class="page-container">
    <h1>Registrar nuevo paciente</h1>
    <form id="patientForm" class="patient-form">
        <div>
            <label>Nombre:</label>
            <input type="text" id="name" required />
        </div>
        <div>
            <label>Especie:</label>
            <input type="text" id="species" required />
        </div>
        <div>
            <label>Raza:</label>
            <input type="text" id="breed" required />
        </div>
        <div>
            <label>Edad:</label>
            <input type="number" id="age" min="0" required />
        </div>
        <div>
            <label>Dueño:</label>
            <input type="text" id="owner" required />
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Guardar</button>
            <a class="btn btn-secondary" href="/patients">Cancelar</a>
        </div>
        <div id="errorPatient" style="color: red; margin-top: 1rem;"></div>
    </form>
</div>

</body>
</html>
